<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Origenow ML Cookie Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      width: 300px;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    header span {
      font-size: 18px;
    }

    .status-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .status-row:last-child { margin-bottom: 0; }

    .label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .badge.success { background: #14532d; color: #4ade80; }
    .badge.error   { background: #450a0a; color: #f87171; }
    .badge.offline { background: #292524; color: #a8a29e; }
    .badge.unknown { background: #1c1917; color: #78716c; }

    .time {
      font-size: 11px;
      color: #555;
    }

    .section-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 6px;
    }

    input[type="text"] {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 12px;
      padding: 6px 8px;
      outline: none;
    }

    input[type="text"]:focus { border-color: #7c3aed; }

    button {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      cursor: pointer;
    }

    button:hover { background: #6d28d9; }

    .sync-btn {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #a78bfa;
      font-size: 12px;
      font-weight: 600;
    }

    .sync-btn:hover { background: #2a2a2a; }

    .toast {
      font-size: 11px;
      color: #4ade80;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
    }

    .toast.error { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <span>🔄</span>
    <h1>Origenow ML Cookie Sync</h1>
  </header>

  <div class="status-card">
    <div class="status-row">
      <span class="label">Último sync</span>
      <span class="badge unknown" id="status-badge">—</span>
    </div>
    <div class="status-row">
      <span class="label">Horário</span>
      <span class="time" id="last-sync">Nunca</span>
    </div>
  </div>

  <div style="margin-bottom: 12px;">
    <p class="section-title">URL do servidor</p>
    <div class="input-row">
      <input type="text" id="server-url" placeholder="http://localhost:3000" />
      <button id="save-url">Salvar</button>
    </div>
  </div>

  <button class="sync-btn" id="sync-now">⟳ Sincronizar agora</button>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
